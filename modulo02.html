<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>
    <h2>Caracetere especiales</h2>
    <!-- dev.w3.org/html5/html-author/charref -->
    Esta es la etiqueta &lt;p&gt; y tiene &copy;
    <h2>Abreviaturas</h2>
    <p>La <abbr title="Organización de naciones Unidas">ONU</abbr></p>
    <p>La <a href="http://www.w3.org" target="_blank"><abbr title="World Wide Web Consortium">W3C</abbr></a> se encarga de definir estandares</p>
    <p>
        <!-- Se pone en datetime una fecha que la máquina entienda -->
        Llegue a Zaragoza el <time datetime="2018-03-07T14:30">miercoles 07 a las 2 y media</time>
    </p>
    <p>
        <!-- Cuando la fecha es mundial se incluye una Z -->
        La hora del planeta será hoy a las <time datetime="20:00Z" title="20:00">8pm</time> en todo el mundo
    </p>
</body>
</html>
